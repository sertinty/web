<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>墨屉 · 空白笔记本</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f5f2e8;
            font-family: -apple-system, 'Segoe UI', 'Noto Sans', system-ui, monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: #2c3e2b;
            color: #f0ebd8;
            padding: 8px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            border-bottom: 2px solid #e6b422;
            flex-shrink: 0;
        }
        .logo {
            font-size: 1.2rem;
            font-weight: 600;
        }
        .logo span { color: #e6b422; }
        .header-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        button, .file-label {
            background: #4a6b3e;
            border: none;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.75rem;
            font-family: inherit;
        }
        button:hover, .file-label:hover { background: #6b8f58; }
        .danger-btn { background: #8b5a2b; }
        .danger-btn:hover { background: #a06e38; }
        input[type="file"] { display: none; }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 220px;
            background: #f0ebe0;
            border-right: 1px solid #d6cfbc;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0;
        }
        .sidebar-header {
            padding: 8px 10px;
            border-bottom: 1px solid #d6cfbc;
        }
        .search-box {
            width: 100%;
            padding: 5px 8px;
            border-radius: 20px;
            border: 1px solid #ccb;
            background: white;
            outline: none;
            font-size: 0.75rem;
        }
        .doc-list {
            flex: 1;
            overflow-y: auto;
            padding: 5px;
        }
        .doc-item {
            padding: 6px 8px;
            margin: 2px 0;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #faf7ef;
            font-size: 0.8rem;
        }
        .doc-item:hover { background: #e4dcc8; }
        .doc-item.active {
            background: #e6b42230;
            border-left: 2px solid #e6b422;
        }
        .doc-title {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 130px;
        }
        .doc-delete {
            opacity: 0;
            color: #b45a2e;
            cursor: pointer;
            font-size: 0.7rem;
        }
        .doc-item:hover .doc-delete { opacity: 1; }
        .sidebar-footer {
            padding: 6px;
            font-size: 0.55rem;
            color: #9aa77a;
            border-top: 1px solid #ddd;
            text-align: center;
        }

        .editor-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: white;
            overflow: hidden;
        }
        .doc-info-bar {
            padding: 6px 12px;
            background: #fefcf6;
            border-bottom: 1px solid #e4ddce;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }
        .title-input {
            flex: 2;
            padding: 5px 10px;
            font-size: 0.9rem;
            border-radius: 20px;
            border: 1px solid #ddd;
            background: white;
        }
        .category-select, .lang-select {
            padding: 4px 8px;
            border-radius: 20px;
            border: 1px solid #ddd;
            background: white;
            font-size: 0.75rem;
        }
        
        .write-core {
            flex: 1;
            display: flex;
            overflow: hidden;
        }
        .editor-pane {
            flex: 1;
            overflow: auto;
            background: #fefefb;
        }
        .preview-pane {
            width: 0;
            overflow: auto;
            background: #fffdf9;
            transition: 0.2s;
        }
        .preview-pane.show {
            width: 45%;
            border-left: 1px solid #ece0cc;
            padding: 12px;
        }
        .preview-header {
            display: flex;
            justify-content: flex-end;
        }
        .toggle-preview {
            background: none;
            border: none;
            color: #8a7e64;
            cursor: pointer;
            font-size: 0.65rem;
        }
        textarea {
            width: 100%;
            height: 100%;
            border: none;
            resize: none;
            font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
            outline: none;
            background: #fefefb;
            padding: 16px 20px;
        }
        .markdown-preview {
            font-family: -apple-system, 'Segoe UI', sans-serif;
            line-height: 1.5;
            font-size: 0.8rem;
        }
        .markdown-preview pre {
            background: #f4f0e6;
            padding: 10px;
            border-radius: 10px;
            overflow-x: auto;
        }
        .status-bar {
            padding: 3px 12px;
            font-size: 0.6rem;
            color: #8faa7a;
            background: #f3efe6;
            border-top: 1px solid #e4ddce;
            display: flex;
            justify-content: space-between;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>

<div class="header">
    <div class="logo">📝 <span>墨屉</span></div>
    <div class="header-actions">
        <button onclick="newDocument()">➕ 新建</button>
        <label class="file-label" for="importTxtFile">📄 导入</label>
        <input type="file" id="importTxtFile" accept=".txt,.md" style="display:none" onchange="importPlainText(this)">
        <label class="file-label" for="importJsonFile">📦 恢复</label>
        <input type="file" id="importJsonFile" accept=".json" style="display:none" onchange="importJsonData(this)">
        <button onclick="exportData()">💾 备份</button>
        <button onclick="clearAllData()" class="danger-btn">🗑 清空</button>
    </div>
</div>

<div class="main-container">
    <div class="sidebar">
        <div class="sidebar-header">
            <input type="text" class="search-box" id="searchDocs" placeholder="搜索..." oninput="filterDocs()">
        </div>
        <div class="doc-list" id="docList"></div>
        <div class="sidebar-footer"></div>
    </div>
    <div class="editor-area">
        <div class="doc-info-bar">
            <input type="text" id="docTitle" class="title-input" placeholder="标题" oninput="updateCurrentDocMeta()">
            <input type="text" id="docCategory" class="category-select" placeholder="分类" oninput="updateCurrentDocMeta()">
            <select id="docLanguage" class="lang-select" onchange="updateCurrentDocMeta(); renderPreview()">
                <option value="markdown">Markdown</option>
                <option value="text">纯文本</option>
                <option value="javascript">JavaScript</option>
                <option value="python">Python</option>
                <option value="html">HTML</option>
                <option value="css">CSS</option>
                <option value="json">JSON</option>
            </select>
        </div>
        
        <div class="write-core">
            <div class="editor-pane">
                <textarea id="docContent" placeholder=""></textarea>
            </div>
            <div class="preview-pane" id="previewPane">
                <div class="preview-header">
                    <button class="toggle-preview" onclick="togglePreview()">✖ 关闭</button>
                </div>
                <div id="previewArea" class="markdown-preview"></div>
            </div>
        </div>
        <div class="status-bar">
            <span id="docStatus"></span>
            <span id="wordCount"></span>
            <span><button class="toggle-preview" onclick="togglePreview()" style="background:none; color:#8a7e64;">👁️ 预览</button></span>
        </div>
    </div>
</div>

<script>
    const STORAGE_KEY = 'mozhi_blank_notebook';
    let knowledgeBase = {};
    let currentDocId = null;
    let autoSaveTimer = null;
    let previewVisible = false;

    function loadData() {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (stored) {
            knowledgeBase = JSON.parse(stored);
        } else {
            knowledgeBase = {};
        }
        renderDocList();
        if (Object.keys(knowledgeBase).length > 0) {
            const firstId = Object.keys(knowledgeBase)[0];
            openDocument(firstId);
        } else {
            newDocument();
        }
    }

    function saveToLocal() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(knowledgeBase));
        renderDocList();
    }

    function generateId() {
        return Date.now().toString(36) + Math.random().toString(36).substr(2, 6);
    }

    function renderDocList(searchTerm = '') {
        const container = document.getElementById('docList');
        const docs = Object.values(knowledgeBase);
        let filtered = docs;
        if (searchTerm) {
            const lower = searchTerm.toLowerCase();
            filtered = docs.filter(d => d.title.toLowerCase().includes(lower));
        }
        if (filtered.length === 0) {
            container.innerHTML = '<div style="padding: 16px; text-align:center; color:#aaa">📭 空白</div>';
            return;
        }
        container.innerHTML = filtered.map(doc => `
            <div class="doc-item ${currentDocId === doc.id ? 'active' : ''}" onclick="openDocument('${doc.id}')">
                <div class="doc-title">${escapeHtml(doc.title) || '无标题'}</div>
                <div class="doc-delete" onclick="event.stopPropagation(); deleteDocById('${doc.id}')">🗑</div>
            </div>
        `).join('');
    }

    function filterDocs() {
        const keyword = document.getElementById('searchDocs').value;
        renderDocList(keyword);
    }

    function openDocument(id) {
        const doc = knowledgeBase[id];
        if (!doc) return;
        currentDocId = id;
        document.getElementById('docTitle').value = doc.title;
        document.getElementById('docCategory').value = doc.category || '';
        document.getElementById('docLanguage').value = doc.language || 'markdown';
        document.getElementById('docContent').value = doc.content;
        renderPreview();
        renderDocList(document.getElementById('searchDocs').value);
        updateWordCount();
        document.getElementById('docStatus').innerHTML = '';
    }

    function getCurrentDocMeta() {
        return {
            title: document.getElementById('docTitle').value.trim() || '无标题',
            category: document.getElementById('docCategory').value,
            language: document.getElementById('docLanguage').value,
            content: document.getElementById('docContent').value
        };
    }

    function updateCurrentDocMeta() {
        if (!currentDocId) return;
        const meta = getCurrentDocMeta();
        if (knowledgeBase[currentDocId]) {
            knowledgeBase[currentDocId].title = meta.title;
            knowledgeBase[currentDocId].category = meta.category;
            knowledgeBase[currentDocId].language = meta.language;
            knowledgeBase[currentDocId].content = meta.content;
            knowledgeBase[currentDocId].updatedAt = new Date().toISOString();
            saveToLocal();
        }
        renderPreview();
    }

    function renderPreview() {
        const content = document.getElementById('docContent').value;
        const lang = document.getElementById('docLanguage').value;
        const previewDiv = document.getElementById('previewArea');
        
        if (!content.trim()) {
            previewDiv.innerHTML = '';
            return;
        }
        
        if (lang === 'markdown') {
            previewDiv.innerHTML = marked.parse(content);
        } else if (lang === 'text') {
            previewDiv.innerHTML = `<pre style="white-space: pre-wrap;">${escapeHtml(content)}</pre>`;
        } else {
            previewDiv.innerHTML = `<pre style="background:#2c2a24; color:#efebd0; padding:12px; border-radius:10px; overflow-x:auto;"><code>${escapeHtml(content)}</code></pre>`;
        }
        updateWordCount();
    }
    
    function updateWordCount() {
        const text = document.getElementById('docContent').value;
        const chars = text.length;
        const words = text.trim().split(/\s+/).filter(w => w.length > 0).length;
        document.getElementById('wordCount').innerText = chars === 0 ? '' : `${chars}字 / ${words}词`;
    }
    
    function newDocument() {
        const now = new Date().toISOString();
        const newId = generateId();
        const newDoc = {
            id: newId,
            title: '无标题',
            content: '',
            category: '',
            language: 'markdown',
            createdAt: now,
            updatedAt: now
        };
        knowledgeBase[newId] = newDoc;
        saveToLocal();
        openDocument(newId);
        document.getElementById('docContent').focus();
    }
    
    function deleteDocById(id) {
        if (!knowledgeBase[id]) return;
        if (confirm(`删除「${knowledgeBase[id].title}」？`)) {
            delete knowledgeBase[id];
            saveToLocal();
            if (currentDocId === id) {
                const remaining = Object.keys(knowledgeBase);
                if (remaining.length > 0) openDocument(remaining[0]);
                else newDocument();
            }
            renderDocList(document.getElementById('searchDocs').value);
        }
    }
    
    function exportData() {
        const dataStr = JSON.stringify(knowledgeBase, null, 2);
        const blob = new Blob([dataStr], {type: 'application/json'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `backup_${new Date().toISOString().slice(0,19)}.json`;
        a.click();
        URL.revokeObjectURL(a.href);
    }
    
    function importJsonData(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const imported = JSON.parse(e.target.result);
                if (typeof imported === 'object' && imported !== null) {
                    knowledgeBase = imported;
                    saveToLocal();
                    const firstId = Object.keys(knowledgeBase)[0];
                    if (firstId) openDocument(firstId);
                    else newDocument();
                    alert('恢复成功');
                } else throw new Error();
            } catch (err) {
                alert('无效文件');
            }
            input.value = '';
        };
        reader.readAsText(file);
    }
    
    function importPlainText(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const now = new Date().toISOString();
            const fileName = file.name.replace(/\.(txt|md)$/, '');
            const newId = generateId();
            const newDoc = {
                id: newId,
                title: fileName || '导入',
                content: e.target.result,
                category: '导入',
                language: 'markdown',
                createdAt: now,
                updatedAt: now
            };
            knowledgeBase[newId] = newDoc;
            saveToLocal();
            openDocument(newId);
            input.value = '';
        };
        reader.readAsText(file);
    }
    
    function clearAllData() {
        if (confirm('⚠️ 清空所有文档？不可恢复。')) {
            knowledgeBase = {};
            saveToLocal();
            newDocument();
            renderDocList();
        }
    }
    
    function togglePreview() {
        const pane = document.getElementById('previewPane');
        previewVisible = !previewVisible;
        if (previewVisible) {
            pane.classList.add('show');
        } else {
            pane.classList.remove('show');
        }
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    document.getElementById('docContent').addEventListener('input', function() {
        if (!currentDocId) return;
        if (autoSaveTimer) clearTimeout(autoSaveTimer);
        autoSaveTimer = setTimeout(() => {
            updateCurrentDocMeta();
        }, 400);
        renderPreview();
    });
    
    loadData();
</script>
</body>
</html>
